<!-- add_company.html -->
{% extends 'base.html' %}
{% block title %}Add New Company{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Add New Company</h2>
    <p>Please fill in the company details below to register a new client.</p>
</div>
<div class="card">
<form>
    <div class="row">
        <div class="col-2">
            <label for="companyName" class="form-label">Company Name</label>
            <input type="text" class="form-input" id="companyName" placeholder="e.g., GlobalTech Inc.">
        </div>
        <div class="col-2">
            <label for="companyEmail" class="form-label">Contact Email</label>
            <input type="email" class="form-input" id="companyEmail" placeholder="e.g., contact@globaltech.com">
        </div>
    </div>
    <div class="row">
        <div class="col-2">
            <label for="companyPhone" class="form-label">Phone Number</label>
            <input type="text" class="form-input" id="companyPhone" placeholder="e.g., +1 (555) 123-4567">
        </div>
        <div class="col-2">
            <label for="companyWebsite" class="form-label">Website</label>
            <input type="url" class="form-input" id="companyWebsite" placeholder="e.g., https://globaltech.com">
        </div>
    </div>
    <div class="form-group">
        <label for="companyAddress" class="form-label">Company Address</label>
        <textarea class="form-textarea" id="companyAddress" rows="3"
            placeholder="123 Main St, Suite 400, New York, NY 10001"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Register Company</button>
</form>
</div>
{% endblock %}
